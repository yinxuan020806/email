<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#0a0e17" />
  <meta name="color-scheme" content="dark light" />
  <title>验证码助手 · 一键提取邮箱验证码</title>
  <link rel="icon" type="image/png" href="/static/icon.png?v=3" />
  <link rel="apple-touch-icon" href="/static/icon.png?v=3" />
  <link rel="stylesheet" href="/static/app.css?v=3" />
</head>
<body data-theme="cyber">
  <div class="aurora" aria-hidden="true">
    <span class="aurora-blob blob-1"></span>
    <span class="aurora-blob blob-2"></span>
    <span class="aurora-blob blob-3"></span>
  </div>

  <button type="button" id="theme-toggle" class="theme-toggle" aria-label="切换主题" title="切换主题">🌐</button>

  <main class="page">
    <header class="brand">
      <div class="brand-mark" aria-hidden="true">
        <img src="/static/icon.png?v=3" alt="" width="56" height="56" />
      </div>
      <h1 class="brand-title">验证码助手</h1>
      <p class="brand-sub">输入邮箱地址 · 一键提取 Cursor / ChatGPT 验证码与登录链接</p>
    </header>

    <section class="search-card" aria-label="查询表单">
      <form id="lookup-form" autocomplete="off" novalidate>
        <div class="search-row">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input
            id="input-credential"
            name="input"
            type="email"
            inputmode="email"
            spellcheck="false"
            autocapitalize="off"
            autocomplete="off"
            placeholder="邮箱地址 · 例：name@outlook.com"
            aria-label="邮箱地址"
            required
          />
          <button type="submit" id="submit-btn" class="btn-primary">
            <span class="btn-spinner" aria-hidden="true"></span>
            <span class="btn-label">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                   stroke="currentColor" stroke-width="2.4"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
              查询
            </span>
          </button>
        </div>
        <div class="category-row" role="radiogroup" aria-label="选择邮件分类">
          <label class="chip">
            <input type="radio" name="category" value="cursor" checked />
            <span class="chip-body">
              <svg class="chip-icon" viewBox="0 0 24 24" width="16" height="16"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="4 17 10 11 4 5"></polyline>
                <line x1="12" y1="19" x2="20" y2="19"></line>
              </svg>
              Cursor
            </span>
          </label>
          <label class="chip">
            <input type="radio" name="category" value="openai" />
            <span class="chip-body">
              <svg class="chip-icon" viewBox="0 0 24 24" width="16" height="16"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
              </svg>
              ChatGPT / OpenAI
            </span>
          </label>
        </div>
      </form>
    </section>

    <section id="result" class="result" aria-live="polite"></section>
  </main>

  <script src="/static/app.js?v=3" defer></script>
</body>
</html>
