<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#5b50f5" />
  <meta name="color-scheme" content="light dark" />
  <title>验证码助手 · 一键提取邮箱验证码</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'&gt;&lt;defs&gt;&lt;linearGradient id='g' x1='0' y1='0' x2='1' y2='1'&gt;&lt;stop offset='0' stop-color='%236d5cf3'/&gt;&lt;stop offset='1' stop-color='%23a855f7'/&gt;&lt;/linearGradient&gt;&lt;/defs&gt;&lt;rect width='64' height='64' rx='16' fill='url(%23g)'/&gt;&lt;path d='M14 22 L32 36 L50 22 M14 42 L26 32 M50 42 L38 32' stroke='white' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' fill='none'/&gt;&lt;/svg&gt;" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="aurora-blob blob-1"></span>
    <span class="aurora-blob blob-2"></span>
    <span class="aurora-blob blob-3"></span>
  </div>

  <main class="page">
    <header class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="32" height="32">
          <defs>
            <linearGradient id="brandG" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#6d5cf3" />
              <stop offset="1" stop-color="#a855f7" />
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="9" fill="url(#brandG)" />
          <path
            d="M7 11 L16 18 L25 11 M7 21 L13 16 M25 21 L19 16"
            stroke="#fff" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round" fill="none"
          />
        </svg>
      </div>
      <h1 class="brand-title">验证码助手</h1>
      <p class="brand-sub">输入邮箱，秒拿 Cursor / ChatGPT 验证码与登录链接</p>
    </header>

    <section class="search-card" aria-label="查询表单">
      <form id="lookup-form" autocomplete="off" novalidate>
        <div class="search-row">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none"
                 stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </span>
          <input
            id="input-credential"
            name="input"
            type="text"
            inputmode="email"
            spellcheck="false"
            autocapitalize="off"
            autocomplete="off"
            placeholder="邮箱地址 · 例：name@outlook.com"
            aria-label="邮箱地址或凭据"
            required
          />
          <button type="submit" id="submit-btn" class="btn-primary">
            <span class="btn-spinner" aria-hidden="true"></span>
            <span class="btn-label">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                   stroke="currentColor" stroke-width="2.4"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
              查询
            </span>
          </button>
        </div>
        <div class="category-row" role="radiogroup" aria-label="选择邮件分类">
          <label class="chip">
            <input type="radio" name="category" value="cursor" />
            <span class="chip-body">
              <svg class="chip-icon" viewBox="0 0 24 24" width="16" height="16"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="4 17 10 11 4 5"></polyline>
                <line x1="12" y1="19" x2="20" y2="19"></line>
              </svg>
              Cursor
            </span>
          </label>
          <label class="chip">
            <input type="radio" name="category" value="openai" checked />
            <span class="chip-body">
              <svg class="chip-icon" viewBox="0 0 24 24" width="16" height="16"
                   fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path>
              </svg>
              ChatGPT / OpenAI
            </span>
          </label>
        </div>
      </form>
    </section>

    <section id="result" class="result" aria-live="polite"></section>

    <footer class="hint">
      <p class="hint-title">支持的输入格式</p>
      <ul class="hint-list">
        <li>
          <code>邮箱</code>
          <span class="hint-desc">站点公开邮箱可直接查询</span>
        </li>
        <li>
          <code>邮箱----密码</code>
          <span class="hint-desc">通用 IMAP / 邮箱密码</span>
        </li>
        <li>
          <code>邮箱----应用专用密码</code>
          <span class="hint-desc">Gmail / Yahoo 授权码</span>
        </li>
      </ul>
    </footer>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
