<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>邮件查看器</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="hero">
    <h1>
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
        <polyline points="3,7 12,13 21,7"></polyline>
      </svg>
      邮件查看器
    </h1>
  </header>

  <main class="container">
    <form id="lookup-form" class="search-card" autocomplete="off" novalidate>
      <div class="search-row">
        <span class="icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input
          id="input-credential"
          name="input"
          type="text"
          inputmode="email"
          spellcheck="false"
          autocapitalize="off"
          autocomplete="off"
          placeholder="邮箱 / 邮箱----密码 / 邮箱----应用专用密码 / 邮箱----密码----client_id----refresh_token"
          required
        />
        <button type="submit" id="submit-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
          搜索
        </button>
      </div>
      <div class="category-row" role="radiogroup" aria-label="选择邮件分类">
        <label class="chip">
          <input type="radio" name="category" value="cursor" />
          <span>Cursor</span>
        </label>
        <label class="chip">
          <input type="radio" name="category" value="openai" checked />
          <span>ChatGPT / OpenAI</span>
        </label>
      </div>
    </form>

    <section id="result" class="result"></section>

    <footer class="hint">
      <p>支持格式：</p>
      <ul>
        <li><code>邮箱</code>（仅站点公共邮箱可用）</li>
        <li><code>邮箱----密码</code></li>
        <li><code>邮箱----Gmail 应用专用密码</code> / <code>邮箱----Yahoo 授权码</code></li>
        <li><code>邮箱----密码----client_id----refresh_token</code>（Outlook OAuth2）</li>
      </ul>
      <p class="warn">
        <strong>安全说明：</strong>您输入的密码 / 授权码仅在本次请求内存中使用，
        服务器不会落库或写入日志。建议优先使用一次性应用专用密码，
        不要使用主账号长期密码。
      </p>
    </footer>
  </main>

  <script src="/static/app.js" defer></script>
</body>
</html>
