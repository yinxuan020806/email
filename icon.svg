<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a1f2e"/>
    </linearGradient>
    
    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 强发光 -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="1"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 网格图案 -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#06b6d4" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>
  
  <!-- 背景 -->
  <rect width="128" height="128" rx="20" fill="url(#bgGradient)"/>
  
  <!-- 网格背景 -->
  <rect width="128" height="128" rx="20" fill="url(#grid)"/>
  
  <!-- 外边框发光 -->
  <rect x="3" y="3" width="122" height="122" rx="17" fill="none" stroke="url(#cyberGradient)" stroke-width="1.5" opacity="0.8"/>
  <rect x="6" y="6" width="116" height="116" rx="14" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  
  <!-- 角落装饰 -->
  <path d="M12 24 L12 12 L24 12" fill="none" stroke="#06b6d4" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M116 24 L116 12 L104 12" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M12 104 L12 116 L24 116" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M116 104 L116 116 L104 116" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- 中心圆环 -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="url(#cyberGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="64" cy="64" r="32" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>
  
  <!-- 切换箭头 - 上 -->
  <g filter="url(#strongGlow)">
    <path d="M36 50 L58 50 L58 42 L76 54 L58 66 L58 58 L36 58 Z" fill="url(#cyberGradient)"/>
  </g>
  
  <!-- 切换箭头 - 下 -->
  <g filter="url(#glow)">
    <path d="M92 78 L70 78 L70 70 L52 82 L70 94 L70 86 L92 86 Z" fill="url(#cyberGradient)" opacity="0.85"/>
  </g>
  
  <!-- 能量粒子 -->
  <circle cx="28" cy="64" r="2" fill="#06b6d4" filter="url(#glow)"/>
  <circle cx="100" cy="64" r="2" fill="#ec4899" filter="url(#glow)"/>
  <circle cx="64" cy="28" r="1.5" fill="#a855f7" filter="url(#glow)"/>
  <circle cx="64" cy="100" r="1.5" fill="#a855f7" filter="url(#glow)"/>
  
  <!-- 扫描线装饰 -->
  <line x1="20" y1="36" x2="36" y2="36" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <line x1="92" y1="92" x2="108" y2="92" stroke="#ec4899" stroke-width="1" opacity="0.5"/>
</svg>
