name: deploy

# 触发条件：
#   - push 到 main 分支
#   - 也可在 Actions 页手动 "Run workflow"
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '*.png'
  workflow_dispatch:
    inputs:
      no_cache:
        description: '强制不使用缓存重建（修改 requirements.txt 时勾上）'
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH → bash scripts/deploy.sh
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH key + known_hosts
        env:
          SSH_KEY:  ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # 写私钥到 ~/.ssh/id_ed25519（保留原始换行，不被 shell quoting 破坏）
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 校验私钥能被 ssh-keygen 解析（如果不行立即 fail，且打出真实错误）
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          echo "✓ private key parsed OK"
          # 抓 host key 防止 StrictHostKeyChecking 提示交互
          ssh-keyscan -H -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>&1
          chmod 600 ~/.ssh/known_hosts

      - name: SSH deploy with full stdout/stderr
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          NO_CACHE: ${{ github.event.inputs.no_cache }}
        run: |
          # 用原生 ssh，stdout/stderr 直接打印到 Actions log
          ssh -i ~/.ssh/id_ed25519 \
              -p "$SSH_PORT" \
              -o BatchMode=yes \
              -o ServerAliveInterval=30 \
              "$SSH_USER@$SSH_HOST" bash -s -- "$NO_CACHE" <<'REMOTE_SCRIPT'
          set -euo pipefail
          NO_CACHE_ARG="${1:-}"
          cd /www/wwwroot/email

          # ── inline self-heal：确保 deploy.sh 自身能被 pull 到最新 ──
          # 死锁场景：当某次 commit 同时改了 docker-compose.yml 和 deploy.sh 时，
          # 服务器上 docker-compose.yml 的本地改动会让 git pull 失败 → 跑的还是
          # 旧 deploy.sh → 下次仍然走老逻辑、还是失败。这里在调用 deploy.sh 前
          # 先在 workflow 端把 compose 隔离掉，让 pull 一定能拿到最新 deploy.sh，
          # 之后就由新版 deploy.sh 自己处理 compose 备份/恢复。
          if [ -f docker-compose.yml ] && [ -d .git ]; then
              if git ls-files --error-unmatch docker-compose.yml >/dev/null 2>&1; then
                  CURRENT_FLAGS=$(git ls-files -v docker-compose.yml | head -c 1)
                  if [ "$CURRENT_FLAGS" = "S" ]; then
                      git update-index --no-skip-worktree docker-compose.yml
                  fi
                  if ! git diff --quiet -- docker-compose.yml; then
                      WF_BACKUP="docker-compose.yml.workflow-$(date +%Y%m%d_%H%M%S)"
                      echo "[self-heal] docker-compose.yml dirty → 备份到 $WF_BACKUP"
                      cp docker-compose.yml "$WF_BACKUP"
                      git checkout HEAD -- docker-compose.yml
                      WF_RESTORE="$WF_BACKUP"
                  fi
                  git update-index --skip-worktree docker-compose.yml || true
              fi
          fi

          # 现在 pull 一次，确保 deploy.sh 是最新版
          git fetch --all --prune || true
          git pull --ff-only || echo "[self-heal] 首次 pull 仍失败（可能 deploy.sh 也无变更），由 deploy.sh 接力处理"

          # 恢复 compose 本地改动
          if [ -n "${WF_RESTORE:-}" ] && [ -f "$WF_RESTORE" ]; then
              echo "[self-heal] 恢复 docker-compose.yml from $WF_RESTORE"
              cp "$WF_RESTORE" docker-compose.yml
          fi

          if [ "$NO_CACHE_ARG" = "true" ]; then
            bash scripts/deploy.sh --no-cache
          else
            bash scripts/deploy.sh
          fi
          REMOTE_SCRIPT
